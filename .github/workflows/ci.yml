name: ORION CI — Syntax & JSON

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Check Python syntax
      run: |
        echo "ORION CI — Checking Python syntax..."
        find . -name '*.py' -not -path './.git/*' | xargs python -m py_compile
        echo "✓ All Python files passed syntax check."

    - name: Validate JSON files
      run: |
        echo "ORION CI — Validating JSON..."
        find . -name '*.json' -not -path './.git/*' | while read f; do
          python -c "import json; json.load(open('$f'))" && echo "OK: $f"
        done
        echo "✓ All JSON files valid."

    - name: Check documentation completeness
      run: |
        echo "ORION CI — Checking documentation..."
        MD_COUNT=$(find . -name '*.md' -not -path './.git/*' | wc -l)
        echo "Found $MD_COUNT markdown files."
        for required in README.md CHANGELOG.md CONTRIBUTING.md; do
          test -f "$required" && echo "OK: $required" || (echo "MISSING: $required" && exit 1)
        done
        echo "✓ ORION CI complete."
