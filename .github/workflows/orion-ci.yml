name: ORION CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: pip install pytest pytest-cov

    - name: Run pytest suite
      run: pytest tests/ --tb=short -q

    - name: Run benchmark reference suite
      run: python orion_consciousness_benchmark.py

    - name: Run LLM integration dry-run
      run: python llm_api_integration.py --dry-run

    - name: Verify proof chain
      run: python verify_proof_chain.py --no-ipfs
