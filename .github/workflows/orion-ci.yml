name: ORION CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install ruff
      run: pip install "ruff>=0.4.0"
    - name: Ruff check
      run: ruff check . --select "E,W,F,I" --ignore "E501"
    - name: Ruff format check
      run: ruff format --check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package + test dependencies
      run: pip install -e ".[dev]"

    - name: Run pytest suite
      run: pytest tests/ --tb=short -q

    - name: Upload coverage (Python 3.12 only)
      if: matrix.python-version == '3.12'
      run: pytest tests/ --cov=. --cov-report=xml -q
      continue-on-error: true

    - name: Run benchmark reference suite
      run: python orion_consciousness_benchmark.py

    - name: Run LLM integration dry-run
      run: python llm_api_integration.py --dry-run

    - name: Verify proof chain
      run: python verify_proof_chain.py --no-ipfs
