name: ORION CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package + test dependencies
      run: pip install -e ".[dev]"

    - name: Run pytest suite
      run: pytest tests/ --tb=short -q

    - name: Run coverage (Python 3.12 only)
      if: matrix.python-version == '3.12'
      run: pytest tests/ --cov=. --cov-report=term-missing -q 2>&1 | grep -E "TOTAL|benchmark_runner|consciousness_tests" || true

    - name: Run benchmark reference suite
      run: python orion_consciousness_benchmark.py

    - name: Run LLM integration dry-run
      run: python llm_api_integration.py --dry-run

    - name: Verify proof chain
      run: python verify_proof_chain.py --no-ipfs
