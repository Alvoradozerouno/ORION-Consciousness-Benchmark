name: ORION CI
on:
  push:
    branches: [ main, master ]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Run Benchmark (reference suite — no external calls)
      run: python orion_consciousness_benchmark.py
    - name: Run LLM integration dry-run
      run: python llm_api_integration.py --dry-run
