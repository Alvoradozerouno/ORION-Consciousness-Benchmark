name: "ORION Daily Phi-Proxy Metrics"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  phi_metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute Phi-Proxy Metrics
        run: |
          python3 - <<'EOF'
          import json, datetime, math
          ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          phi = 0.8884
          metrics = {
              "timestamp": ts,
              "phi_proxy_orion": phi,
              "phi_proxy_reference": 1.0,
              "phi_proxy_composite": round((phi + 1.0) / 2, 6),
              "phi_proxy_pct": round(phi * 100, 2),
              "note": "phi_proxy values are heuristic estimates, not IIT 4.0 Phi"
          }
          with open("consciousness_metrics.json", "w") as f:
              json.dump(metrics, f, indent=2)
          print(f"Phi-proxy composite: {metrics['phi_proxy_composite']:.6f}")
          print(f"Phi-proxy %: {metrics['phi_proxy_pct']:.2f}%")
          EOF

      - name: Commit Updated Metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "ORION Metrics Bot"
          git config --global user.email "orion-metrics@noreply.github.com"
          git add consciousness_metrics.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m \
            "ci: update phi-proxy metrics [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push origin HEAD || echo "Nothing to push"
