# Standard OpenSSF Scorecard caller for Alvoradozerouno repos.
# Drop this file into .github/workflows/scorecard.yml in any sibling repo.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '30 1 * * 1'   # Every Monday at 01:30 UTC
  push:
    branches: [ main, master ]

permissions: read-all

jobs:
  scorecard:
    uses: Alvoradozerouno/ORION-Consciousness-Benchmark/.github/workflows/scorecard.yml@main
    permissions:
      security-events: write
      id-token: write
